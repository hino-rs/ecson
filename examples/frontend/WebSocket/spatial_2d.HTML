<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Spatial2D Test Client</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #e0e0e0; font-family: monospace; font-size: 12px; }

  #toolbar {
    height: 36px;
    padding: 0 12px;
    background: #1a1a22;
    border-bottom: 1px solid #2a2a3a;
    display: flex; align-items: center; gap: 10px;
  }
  #ws-url {
    background: #111; border: 1px solid #333; color: #ccc;
    padding: 3px 7px; border-radius: 4px; font-family: monospace; font-size: 12px; width: 200px;
  }
  button {
    background: #2a2a3a; border: 1px solid #444; color: #ccc;
    padding: 3px 11px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  button:hover { background: #3a3a4a; }
  button.accent { background: #1a3a2a; border-color: #2a6a3a; color: #6f6; }
  button.accent:hover { background: #1a4a2a; }
  #status { padding: 2px 10px; border-radius: 10px; background: #3a1a1a; color: #f44; }
  #status.connected { background: #1a3a1a; color: #4f4; }
  #coords { margin-left: auto; color: #555; }

  #body { display: flex; height: calc(100vh - 36px); }

  canvas { flex: 1; display: block; cursor: crosshair; background: #13131c; }

  #sidebar {
    width: 210px; min-width: 210px;
    border-left: 1px solid #2a2a3a;
    background: #1a1a22;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-title {
    font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px;
    padding: 6px 10px; border-bottom: 1px solid #2a2a3a; flex-shrink: 0;
  }
  #player-list { flex: 1; overflow-y: auto; padding: 6px; min-height: 0; }
  .pe { padding: 3px 6px; border-radius: 3px; margin-bottom: 2px; cursor: default; }
  .pe-me     { background: #1a2a3a; color: #6af; }
  .pe-nearby { background: #1a2a1a; color: #6f6; cursor: pointer; }
  .pe-nearby:hover { background: #1a3a1a; }

  #log-wrap { height: 150px; flex-shrink: 0; border-top: 1px solid #2a2a3a; display: flex; flex-direction: column; }
  #log { flex: 1; overflow-y: auto; padding: 4px 8px; font-size: 10px; line-height: 1.7; min-height: 0; }
  .lr { color: #4f4; } .ls { color: #48f; } .ll { color: #fa4; }
</style>
</head>
<body>

<div id="toolbar">
  <label>WS</label>
  <input id="ws-url" type="text" value="ws://127.0.0.1:8080">
  <button id="btn-conn">接続</button>
  <span id="status">切断中</span>
  <button class="accent" id="btn-rendezvous" title="原点 (0,0) へ移動">集合地点へ</button>
  <span id="coords">x: - / y: -</span>
</div>

<div id="body">
  <canvas id="canvas"></canvas>
  <div id="sidebar">
    <div class="panel-title">プレイヤー（クリックで追跡）</div>
    <div id="player-list"></div>
    <div id="log-wrap">
      <div class="panel-title">ログ</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script>
// -------------------------------------------------------
// 定数（サーバー設定と合わせる）
// -------------------------------------------------------
const INTEREST_R    = 200;
const ZONE_SIZE     = 100;
const POS_INTERVAL  = 2500;  // 位置を定期送信する間隔 (ms)
const STALE_TIMEOUT = 10000; // この時間更新がなければ非表示 (ms)

// -------------------------------------------------------
// 状態
// -------------------------------------------------------
let ws       = null;
let myId     = null; // サーバーが "hello {id}" を送ってきたときにセット
let posTimer = null;
let tracking = null; // 追跡中の player id

// 初期位置：原点付近にランダム配置して多人数テストでも重ならない
let myPos = {
  x: Math.round((Math.random() - 0.5) * 80),
  y: Math.round((Math.random() - 0.5) * 80),
};
let viewX = myPos.x, viewY = myPos.y, scale = 1.0;

const players = new Map(); // id → { x, y, updatedAt }

// -------------------------------------------------------
// DOM
// -------------------------------------------------------
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const coordEl  = document.getElementById('coords');
const logEl    = document.getElementById('log');
const btnConn  = document.getElementById('btn-conn');

// -------------------------------------------------------
// Canvas リサイズ
// -------------------------------------------------------
function resizeCanvas() {
  const body    = document.getElementById('body');
  const sidebar = document.getElementById('sidebar');
  canvas.width  = body.clientWidth - sidebar.clientWidth;
  canvas.height = body.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', () => { resizeCanvas(); loop(); });

// -------------------------------------------------------
// ログ
// -------------------------------------------------------
function log(msg, cls) {
  const d = document.createElement('div');
  d.textContent = msg;
  d.className = cls;
  logEl.appendChild(d);
  if (logEl.children.length > 120) logEl.firstChild.remove();
  logEl.scrollTop = logEl.scrollHeight;
}

// -------------------------------------------------------
// WebSocket
// -------------------------------------------------------
function connect() {
  const url = document.getElementById('ws-url').value.trim();
  ws = new WebSocket(url);
  ws.onopen = () => {
    setConn(true);
    log('接続しました', 'll');
    // 接続直後に自分の位置をサーバーに知らせる
    sendMove(myPos.x, myPos.y, false);
    // 定期送信を開始（AOI を維持するため）
    posTimer = setInterval(() => sendMove(myPos.x, myPos.y, false), POS_INTERVAL);
  };
  ws.onclose = () => {
    setConn(false);
    log('切断しました', 'll');
    clearInterval(posTimer);
    ws = null; myId = null; posTimer = null;
    players.clear();
  };
  ws.onerror = () => log('接続エラー', 'll');
  ws.onmessage = ({ data }) => {
    const t = data.trim();
    log('← ' + t, 'lr');
    onMessage(t);
  };
}

function setConn(ok) {
  statusEl.textContent = ok ? '接続中' : '切断中';
  statusEl.className   = ok ? 'connected' : '';
  btnConn.textContent  = ok ? '切断' : '接続';
}

btnConn.addEventListener('click', () => ws ? ws.close() : connect());

// 集合地点ボタン：原点 (0,0) へ移動
document.getElementById('btn-rendezvous').addEventListener('click', () => {
  sendMove(0, 0);
});

// -------------------------------------------------------
// メッセージ処理
// -------------------------------------------------------
function onMessage(text) {
  const p = text.split(' ');

  // "pos {id} {x} {y}" → 受け取った pos はすべて他プレイヤー
  // サーバーは自分自身の pos を自分に送らないため、
  // ここに届くものは全員「他人」として扱う
  if (p[0] === 'pos' && p.length === 4) {
    const id = p[1], x = +p[2], y = +p[3];
    if (!isNaN(x) && !isNaN(y)) {
      players.set(id, { x, y, updatedAt: Date.now() });
    }
  }

  // "hello {id}" → 自分の ID をサーバーが通知する場合（任意実装）
  // サーバー側で接続時に送るようにすれば myId が確定する
  if (p[0] === 'hello' && p.length === 2) {
    myId = p[1];
    log('自分のID: ' + myId, 'll');
  }
}

// -------------------------------------------------------
// 移動
// -------------------------------------------------------
function sendMove(wx, wy, updateView = true) {
  const x = Math.round(wx), y = Math.round(wy);
  myPos = { x, y };
  if (updateView) { viewX = x; viewY = y; }
  const cmd = `/move ${x} ${y}`;
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(cmd);
    if (updateView) log('→ ' + cmd, 'ls');
  } else {
    if (updateView) log('(未接続) ' + cmd, 'll');
  }
}

// -------------------------------------------------------
// 座標変換
// -------------------------------------------------------
function toWorld(cx, cy) {
  return {
    x: (cx - canvas.width  / 2) / scale + viewX,
    y: (cy - canvas.height / 2) / scale + viewY,
  };
}
function toCanvas(wx, wy) {
  return {
    x: (wx - viewX) * scale + canvas.width  / 2,
    y: (wy - viewY) * scale + canvas.height / 2,
  };
}

// -------------------------------------------------------
// インタラクション
// -------------------------------------------------------
canvas.addEventListener('click', e => {
  tracking = null; // クリック移動で追跡解除
  const r = canvas.getBoundingClientRect();
  const { x, y } = toWorld(e.clientX - r.left, e.clientY - r.top);
  sendMove(x, y);
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const { x, y } = toWorld(e.clientX - r.left, e.clientY - r.top);
  coordEl.textContent = `x: ${Math.round(x)} / y: ${Math.round(y)}`;
});

canvas.addEventListener('wheel', e => {
  scale = Math.min(5, Math.max(0.2, scale * (e.deltaY < 0 ? 1.1 : 0.9)));
  e.preventDefault();
}, { passive: false });

// -------------------------------------------------------
// 描画ヘルパー
// -------------------------------------------------------
function drawGrid() {
  const step = ZONE_SIZE * scale;
  const ox = ((-viewX * scale) % step + canvas.width  / 2 % step + step * 2) % step;
  const oy = ((-viewY * scale) % step + canvas.height / 2 % step + step * 2) % step;
  ctx.strokeStyle = '#1e1e2e'; ctx.lineWidth = 1;
  for (let x = ox; x < canvas.width;  x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = oy; y < canvas.height; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
}

function drawDot(wx, wy, r, fill, stroke, lw) {
  const c = toCanvas(wx, wy);
  ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
}

function drawLabel(wx, wy, text, color, dy) {
  const c = toCanvas(wx, wy);
  ctx.fillStyle = color; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(text, c.x, c.y + (dy ?? -14));
}

// 画面外プレイヤーへの矢印（エッジに表示）
function drawEdgeArrow(wx, wy, color) {
  const cx = canvas.width  / 2 + (wx - viewX) * scale;
  const cy = canvas.height / 2 + (wy - viewY) * scale;
  const dx = cx - canvas.width  / 2;
  const dy = cy - canvas.height / 2;
  const angle = Math.atan2(dy, dx);
  const margin = 24;
  const ex = canvas.width  / 2 + Math.cos(angle) * (canvas.width  / 2 - margin);
  const ey = canvas.height / 2 + Math.sin(angle) * (canvas.height / 2 - margin);
  const len = 12, hw = 5;
  const ax = ex - Math.cos(angle) * len;
  const ay = ey - Math.sin(angle) * len;
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2; ctx.globalAlpha = 0.7;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - Math.cos(angle - 0.4) * hw, ey - Math.sin(angle - 0.4) * hw);
  ctx.lineTo(ex - Math.cos(angle + 0.4) * hw, ey - Math.sin(angle + 0.4) * hw);
  ctx.closePath(); ctx.fill();
  const dist = Math.round(Math.hypot(wx - myPos.x, wy - myPos.y));
  ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.globalAlpha = 0.8;
  ctx.fillText(dist, ex + Math.cos(angle + Math.PI) * 16, ey + Math.sin(angle + Math.PI) * 16);
  ctx.restore();
}

function isOnScreen(wx, wy) {
  const c = toCanvas(wx, wy);
  return c.x >= 0 && c.x <= canvas.width && c.y >= 0 && c.y <= canvas.height;
}

// -------------------------------------------------------
// メインループ
// -------------------------------------------------------
function loop() {
  drawFrame();
  requestAnimationFrame(loop);
}

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();

  // AOI 範囲円
  const cc = toCanvas(myPos.x, myPos.y);
  const cr = INTEREST_R * scale;
  ctx.beginPath(); ctx.arc(cc.x, cc.y, cr, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(100,160,255,0.04)'; ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();

  // 原点マーカー
  const oc = toCanvas(0, 0);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(oc.x - 8, oc.y); ctx.lineTo(oc.x + 8, oc.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(oc.x, oc.y - 8); ctx.lineTo(oc.x, oc.y + 8); ctx.stroke();
  ctx.fillStyle = '#444'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('(0,0)', oc.x, oc.y - 11);

  // 追跡中ならビューをそのプレイヤーに追従
  if (tracking !== null) {
    const tp = players.get(tracking);
    if (tp) { viewX = tp.x; viewY = tp.y; }
    else tracking = null;
  }

  // 他プレイヤー描画
  const now = Date.now();
  const pl  = document.getElementById('player-list');
  pl.innerHTML = '';

  // 自分エントリ
  const me = document.createElement('div');
  me.className = 'pe pe-me';
  me.textContent = `[自分] ${myId ?? '?'}  (${myPos.x}, ${myPos.y})`;
  pl.appendChild(me);

  for (const [id, p] of players) {
    if (now - p.updatedAt > STALE_TIMEOUT) continue;

    const isTracked = id === tracking;
    const dist = Math.round(Math.hypot(p.x - myPos.x, p.y - myPos.y));

    if (isOnScreen(p.x, p.y)) {
      // 画面内：通常描画
      drawDot(p.x, p.y, 7, isTracked ? '#ff4' : '#4f4', isTracked ? '#ff8' : '#8f8', isTracked ? 2.5 : 1.5);
      drawLabel(p.x, p.y, id, isTracked ? '#ff4' : '#aaa');
      // 追跡中なら接続線
      if (isTracked) {
        const fc = toCanvas(myPos.x, myPos.y), tc = toCanvas(p.x, p.y);
        ctx.save();
        ctx.strokeStyle = 'rgba(255,220,50,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(fc.x, fc.y); ctx.lineTo(tc.x, tc.y); ctx.stroke();
        ctx.restore();
      }
    } else {
      // 画面外：エッジ矢印
      drawEdgeArrow(p.x, p.y, isTracked ? '#ff4' : '#6f6');
    }

    // サイドバーエントリ
    const d = document.createElement('div');
    d.className = 'pe pe-nearby';
    d.textContent = `${isTracked ? '👁 ' : ''}[近隣] ${id}  dist:${dist}`;
    d.title = `クリックで追跡${isTracked ? '（追跡中）' : ''}`;
    d.addEventListener('click', () => {
      tracking = tracking === id ? null : id;
    });
    pl.appendChild(d);
  }

  // 自分
  drawDot(myPos.x, myPos.y, 9, '#4af', '#8cf', 2);
  drawLabel(myPos.x, myPos.y, myId ? `me(${myId})` : 'me', '#fff');
}
</script>
</body>
</html>
